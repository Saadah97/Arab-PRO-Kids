<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🕌 Arab PRO Kids</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #F0FDF4; }
        .font-kids { font-family: 'Baloo 2', cursive; }
        .module-card { border-bottom: 6px solid rgba(0,0,0,0.1); border-radius: 1.5rem; cursor: pointer; }
        .module-card:active { transform: translateY(4px); border-bottom: 2px solid rgba(0,0,0,0.1); }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="text-gray-800 h-screen flex flex-col overflow-hidden">

    <div class="max-w-md w-full h-full mx-auto bg-white shadow-2xl relative flex flex-col">
        
        <div id="main-screen" class="flex flex-col h-full fade-in">
            <div class="bg-emerald-500 text-white p-6 rounded-b-3xl">
                <h1 class="text-3xl font-kids font-bold">Arab PRO Kids</h1>
                <p>Belajar Arab jadi seronok!</p>
            </div>
            
            <div class="flex-1 p-6 space-y-4">
                <button onclick="openAI()" class="w-full bg-orange-100 p-6 rounded-2xl module-card flex items-center gap-4 text-left border-2 border-orange-200">
                    <div class="text-4xl text-orange-500"><i class="fa-solid fa-robot"></i></div>
                    <div>
                        <h3 class="font-bold text-lg">AI Tutor Pintar</h3>
                        <p class="text-sm text-gray-600">Tanya saya apa saja soalan Arab!</p>
                    </div>
                </button>
            </div>
        </div>

        <div id="ai-modal" class="hidden absolute inset-0 bg-white z-50 flex flex-col">
            <div class="p-4 bg-orange-500 text-white flex items-center gap-4">
                <button onclick="closeAI()"><i class="fa-solid fa-arrow-left"></i></button>
                <h2 class="font-bold text-xl">AI Tutor</h2>
            </div>
            <div id="chat-box" class="flex-1 p-4 overflow-y-auto space-y-4 bg-gray-50">
                <div class="bg-white p-3 rounded-lg shadow-sm max-w-[80%]">Halo! Saya AI Tutor anda. Apa yang ingin dipelajari hari ini?</div>
            </div>
            <div class="p-4 border-t flex gap-2">
                <input id="chat-input" type="text" placeholder="Tanya soalan..." class="flex-1 border p-2 rounded-lg">
                <button onclick="sendMessage()" class="bg-orange-500 text-white px-4 py-2 rounded-lg"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        function openAI() { document.getElementById('ai-modal').classList.remove('hidden'); }
        function closeAI() { document.getElementById('ai-modal').classList.add('hidden'); }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const chatBox = document.getElementById('chat-box');
            if (!input.value) return;

            // Tambah mesej user
            chatBox.innerHTML += `<div class="bg-blue-100 p-3 rounded-lg ml-auto max-w-[80%]">${input.value}</div>`;
            
            // Simulasi jawapan AI
            setTimeout(() => {
                chatBox.innerHTML += `<div class="bg-white p-3 rounded-lg shadow-sm max-w-[80%]">Wah, soalan yang bagus! Dalam bahasa Arab, itu dipanggil... (Sistem sedang bersambung ke API AI).</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 500);

            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
